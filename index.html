<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLVERSEARCH | Launching Soon</title>
    <style>
        :root {
            /* Core color theme retained */
            --bg-deep: #0b1120;
            --accent-blue: #38bdf8;
            --accent-blue-bright: #7dd3fc;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Centralized glow for depth without needing a box */
            background: radial-gradient(circle at center, #1e293b 0%, #0b1120 100%);
            overflow: hidden;
        }

        .container {
            /* Removed card background, borders, and shadows */
            text-align: center;
            max-width: 600px;
            width: 90%;
            padding: 2rem;
            animation: fadeUp 1.2s ease-out;
        }

        h1 {
            font-size: 3.5rem;
            letter-spacing: -0.03em;
            font-weight: 800;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        /* Much longer, dynamic accent line */
        .accent-line {
            height: 3px;
            background-color: var(--accent-blue);
            margin: 0 auto 2.5rem auto;
            border-radius: 2px;
            animation: pulseWidth 3s infinite ease-in-out;
        }

        p.description {
            color: var(--text-dim);
            line-height: 1.6;
            font-size: 1.3rem;
            margin-bottom: 3.5rem;
        }

        /* Increased blue coloring for key phrases */
        .highlight {
            color: var(--accent-blue);
            font-weight: 600;
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
        }

        .highlight-bright {
            color: var(--accent-blue-bright);
            font-weight: 500;
        }

        /* A clean, glowing pill for the launch text */
        .launch-badge {
            display: inline-block;
            color: var(--bg-deep);
            background-color: var(--accent-blue);
            padding: 0.6rem 2rem;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
            animation: subtlePulse 2s infinite alternate ease-in-out;
        }

        /* --- Keyframe Animations --- */
        @keyframes fadeUp {
            from { 
                opacity: 0; 
                transform: translateY(30px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        @keyframes pulseWidth {
            0% { 
                width: 80px; 
                opacity: 0.5; 
                box-shadow: 0 0 0px transparent;
            }
            50% { 
                /* Line grows significantly wider */
                width: 350px; 
                opacity: 1; 
                box-shadow: 0 0 15px var(--accent-blue); 
            }
            100% { 
                width: 80px; 
                opacity: 0.5; 
                box-shadow: 0 0 0px transparent;
            }
        }

        @keyframes subtlePulse {
            from { 
                transform: scale(1); 
                box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); 
            }
            to { 
                transform: scale(1.05); 
                box-shadow: 0 0 25px rgba(56, 189, 248, 0.6); 
            }
        }
        
        /* Mobile responsiveness for the long line */
        @media (max-width: 500px) {
            h1 { font-size: 2.5rem; }
            @keyframes pulseWidth {
                0% { width: 50px; }
                50% { width: 250px; }
                100% { width: 50px; }
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>SOLVERSEARCH</h1>
        <div class="accent-line"></div>
        
        <p class="description">
            Solver Search is an <span class="highlight-bright">AI-powered</span><br>
            <span class="highlight">human search engine</span>.
        </p>
        
        <div class="launch-badge">launching soon</div>
    </div>

</body>
</html>
